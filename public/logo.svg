<svg xmlns="http://www.w3.org/2000/svg" width="350" height="350" viewBox="0 0 350 350" role="img">
<title>Code logo with pencil replacing the slash</title>
<desc>An icon of left and right angle brackets and a pencil, in black with a thin white outline, in place of the diagonal slash, visible on both light and dark backgrounds.</desc>
<polyline points="128,135 82,175 128,215" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="128,135 82,175 128,215" fill="none" stroke="#000000" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="222,135 268,175 222,215" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="222,135 268,175 222,215" fill="none" stroke="#000000" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
<g transform="translate(175,175) rotate(18)">
<rect x="-7" y="-75" width="14" height="120" fill="#000000" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round"/>
<polygon points="-7,45 0,78 7,45" fill="#000000" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round"/>
<line x1="-7" y1="-60" x2="7" y2="-60" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
<line x1="-7" y1="-46" x2="7" y2="-46" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
</g>
</svg>
